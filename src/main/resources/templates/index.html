<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium QR Code Generator</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --panel-bg: rgba(255, 255, 255, 0.03);
            --panel-border: rgba(255, 255, 255, 0.08);
            --accent-color: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ae9ff4;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        button:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        .result-panel {
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid var(--panel-border);
            animation: fadeIn 0.5s ease forwards;
        }

        .qr-wrapper {
            background: #fff;
            padding: 16px;
            border-radius: 16px;
            display: inline-block;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .qr-wrapper img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .download-btn {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border: 1px solid var(--panel-border);
            box-shadow: none;
            display: inline-block;
            text-decoration: none;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .download-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>QR Studio</h1>
    <p class="subtitle">신속하고 안전한 프리미엄 QR 코드 생성기</p>

    <form action="/generate" method="post">
        <div class="form-group">
            <label for="url">URL or Text</label>
            <input type="text" id="url" name="url" th:value="${savedUrl}" placeholder="https://example.com" required>
        </div>
        <button type="submit">QR 코드 생성하기</button>
    </form>

    <!-- 결과 화면 출력 (QR 코드가 존재할 때만 표시) -->
    <div class="result-panel" th:if="${qrCode != null}">
        <div class="qr-wrapper">
            <img th:src="'data:image/png;base64,' + ${qrCode}" alt="Generated QR Code">
        </div>
        <a th:href="'data:image/png;base64,' + ${qrCode}" download="qrcode.png" class="download-btn">내 컴퓨터에 저장</a>
    </div>
</div>

</body>
</html>
